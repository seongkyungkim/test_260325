<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클로드코드 워크샵</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container { max-width: 600px; padding: 40px; text-align: center; }
  h1 {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(135deg, #4f8cff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .subtitle { color: #8b8fa3; font-size: 14px; margin-bottom: 40px; }
  .links { display: flex; flex-direction: column; gap: 14px; }
  a {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #1e2230;
    border: 1px solid #2a2e3f;
    border-radius: 14px;
    padding: 20px 24px;
    color: #e8eaf0;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: all 0.2s;
  }
  a:hover { border-color: #4f8cff; transform: translateY(-2px); }
  .icon { font-size: 24px; }
  .desc { font-size: 12px; color: #8b8fa3; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>클로드코드 워크샵</h1>
  <div class="subtitle">2026년 3월 25일</div>
  <div class="links">
    <a href="./2-체험용-샘플/dashboard.html">
      <span class="icon">📊</span>
      <div>마케팅팀 업무 대시보드<div class="desc">할 일, 매출 현황, 주간 일정</div></div>
    </a>
    <a href="./2-체험용-샘플/매출매입_대시보드.html">
      <span class="icon">💰</span>
      <div>매출매입 현황 대시보드<div class="desc">매출/매입 종합 분석</div></div>
    </a>
    <a href="./2-체험용-샘플/체중관리_대시보드.html">
      <span class="icon">🏋️</span>
      <div>체중관리 대시보드<div class="desc">체중 기록 및 추이</div></div>
    </a>
  </div>
</div>
</body>
</html>
